name: Vest Routines

on:
  schedule:
    - cron: '0 18 * * 0'   # Every Sunday 6pm UTC (8pm Brussels)
  workflow_dispatch:         # Manual trigger from Claude Code or GitHub UI

jobs:
  nse-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run NSE tracker
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: cd scripts && python nse_tracker.py
      - name: Commit output
        run: |
          git config user.name "vest-bot"
          git config user.email "vest-bot@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: market tracker output $(date -u +%Y-%m-%d)"
          git push

  job-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run job scanner
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: cd scripts && python job_scanner.py
      - name: Commit output
        run: |
          git config user.name "vest-bot"
          git config user.email "vest-bot@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "chore: job scan output $(date -u +%Y-%m-%d)"
          git push
